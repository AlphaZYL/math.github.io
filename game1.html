<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关卡一：逻辑迷宫</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }

        /* 延续主页背景 */
        .bg-image {
            background-image: url('image_0.png'); 
            height: 100%; 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* 稍深的遮罩，聚焦游戏 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .game-title {
            color: #FF9800; /* 亮橙色 */
            font-size: 2.5em;
            margin: 0 0 30px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 核心游戏容器：干净、白色、巨大 */
        #game-area {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            width: 90%;
            max-width: 1000px;
            height: 70vh; /* 占据可视高度的70% */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 5px solid white;
            color: #555;
            font-size: 1.5em;
            position: relative;
            overflow: hidden; /* 方便未来在此区域做 Canvas 或 SVG */
        }

        .back-btn { 
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: inline-block; 
            padding: 15px 35px; 
            background-color: #2196F3; /* 蓝色按钮 */
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-size: 1.2em;
            font-weight: bold; 
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .back-btn:hover { 
            background-color: #1976D2; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="overlay">
            <h2 class="game-title">🧩 关卡一：逻辑迷宫</h2>
            
            <div id="game-area">
                <div style="text-align: center;">
                    <p style="font-size: 2em; margin-bottom: 10px;">🌟</p>
                    <p>（在此处加载游戏脚本）</p>
                    <p style="color: #888; font-size: 0.8em;">等待迎接挑战...</p>
                </div>
            </div>

            <a href="index.html" class="back-btn">🔙 返回主界面</a>
        </div>
    </div>

</body>
</html>
