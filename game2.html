<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第二关：密码破解 - 趣味奥数闯关大挑战</title>
    <style>
        :root {
            --bg-deep: #010515; 
            --bg-mid: #0a193c;
            --highlight-cyan: #00f2ff; 
            --highlight-blue: #0a99ff; 
            --text-light: #e0f7fa; 
            --glass-bg: rgba(10, 25, 60, 0.7);
            --correct-color: #4CAF50;
            --error-color: #ff5252;
        }

        body, html {
            height: 100%; margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden; 
            background: radial-gradient(circle at center, var(--bg-mid) 0%, var(--bg-deep) 100%); 
            color: var(--text-light);
        }

        /* 纯CSS科技网格背景 */
        .tech-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 0;
        }

        .overlay {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; padding: 20px; position: relative; z-index: 10;
        }

        .header-bar {
            width: 90%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center;
            margin-top: 20px; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .game-title { color: var(--highlight-cyan); font-size: 2.2em; margin: 0; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .mission-status { color: var(--highlight-blue); font-size: 1.1em; letter-spacing: 1px; font-weight: bold; }

        /* 核心答题区域 */
        #puzzle-container {
            background: rgba(15, 30, 60, 0.6);
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 20px; width: 90%; max-width: 800px; height: auto; padding: 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            position: relative; box-sizing: border-box;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 终端解密线索区域 */
        .terminal-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--highlight-blue);
            border-radius: 10px; padding: 20px; width: 100%; margin-bottom: 30px;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        
        .terminal-header {
            color: var(--highlight-cyan); font-weight: bold; font-size: 1.2em; margin-bottom: 15px;
            border-bottom: 1px dashed var(--highlight-cyan); padding-bottom: 5px;
        }

        .log-line {
            font-size: 1.2em; margin-bottom: 12px; line-height: 1.5; color: #fff;
        }
        .highlight-num { color: #FF9800; font-weight: bold; font-size: 1.3em; margin: 0 5px; }

        /* 密码输入框区域 */
        .pwd-container {
            display: flex; gap: 20px; margin-bottom: 20px;
        }

        .pwd-box {
            width: 80px; height: 100px; background: rgba(10, 25, 60, 0.8);
            border: 3px solid var(--highlight-blue); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        .pwd-box:focus-within {
            border-color: var(--highlight-cyan); box-shadow: 0 0 20px var(--highlight-cyan);
            transform: translateY(-5px);
        }

        .pwd-input {
            width: 100%; height: 100%; background: transparent; border: none;
            color: var(--highlight-cyan); font-size: 3.5em; font-weight: bold;
            text-align: center; outline: none; text-shadow: 0 0 15px var(--highlight-cyan);
        }

        /* 提交按钮与反馈 */
        .submit-btn {
            background: linear-gradient(135deg, #0a99ff, #00f2ff); border: none; color: #000;
            padding: 12px 40px; font-size: 1.3em; font-weight: bold; border-radius: 30px;
            cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.3);
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 242, 255, 0.5); }

        #feedback { margin-top: 20px; font-size: 1.2em; font-weight: bold; height: 30px; text-align: center; }
        .correct-text { color: var(--correct-color); text-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }
        .error-text { color: var(--error-color); text-shadow: 0 0 10px rgba(255, 82, 82, 0.5); }

        /* ---- 右下角操作区 ---- */
        .action-bar {
            position: absolute; bottom: 60px; right: 5%; display: flex; gap: 15px; z-index: 100;
        }
        
        .nav-btn {
            display: inline-block; padding: 12px 25px; 
            background-color: var(--glass-bg); color: var(--text-light); 
            text-decoration: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; 
            transition: all 0.2s; border: 1px solid rgba(0, 242, 255, 0.3); cursor: pointer;
        }
        .nav-btn:hover { background-color: rgba(20, 60, 120, 0.9); border-color: var(--highlight-cyan); color: var(--highlight-cyan); }
        
        #next-btn { background-color: rgba(0, 242, 255, 0.15); border-color: var(--highlight-cyan); }

    </style>
</head>
<body>

    <div class="tech-grid"></div>

    <div class="overlay">
        <div class="header-bar">
            <h2 class="game-title">🔐 第二关：密码破解</h2>
            <div class="mission-status">截获机密保险箱</div>
        </div>
        
        <div id="puzzle-container">
            
            <div class="terminal-box">
                <div class="terminal-header">▶ 有一个保险箱，关于三位数的密码，系统截获了甲乙丙三人的通话录音：</div>
                <div class="log-line">甲说：<span class="highlight-num">739</span> ，有一个数字正确且位置正确</div>
                <div class="log-line">乙说：<span class="highlight-num">752</span> ，有一个数字正确但位置不对</div>
                <div class="log-line">丙说：<span class="highlight-num">317</span> ，有两个数字正确但位置都不对</div>
                <div class="log-line" style="color: #aaa; margin-top: 15px; font-size: 0.9em;">系统提示：请根据以上逻辑，推断出正确的三位数密码。</div>
            </div>

            <div class="pwd-container">
                <div class="pwd-box"><input type="text" id="n1" class="pwd-input" maxlength="1" onkeyup="autoFocus(this, 'n2', null)"></div>
                <div class="pwd-box"><input type="text" id="n2" class="pwd-input" maxlength="1" onkeyup="autoFocus(this, 'n3', 'n1')"></div>
                <div class="pwd-box"><input type="text" id="n3" class="pwd-input" maxlength="1" onkeyup="autoFocus(this, null, 'n2')"></div>
            </div>

            <button class="submit-btn" onclick="checkPassword()">解锁系统</button>
            <div id="feedback"></div>

        </div>

        <div class="action-bar">
            <a href="game1.html" class="nav-btn">上一关</a>
            <a href="game3.html" id="next-btn" class="nav-btn" style="display: none;">下一关</a>
            <a href="index.html" class="nav-btn">返回游戏大厅</a>
        </div>
    </div>

    <script>
        // 输入框自动跳格体验优化
        function autoFocus(current, nextFieldID, prevFieldID) {
            // 如果输入了数字，跳到下一个
            if (current.value.length >= current.maxLength && nextFieldID) {
                document.getElementById(nextFieldID).focus();
            }
            // 如果按了退格键且当前为空，退回上一个
            if (event.key === "Backspace" && current.value.length === 0 && prevFieldID) {
                document.getElementById(prevFieldID).focus();
            }
            // 限制只能输入数字
            current.value = current.value.replace(/[^0-9]/g, '');
        }

        function checkPassword() {
            const val1 = document.getElementById('n1').value;
            const val2 = document.getElementById('n2').value;
            const val3 = document.getElementById('n3').value;
            const feedbackEl = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');

            const attempt = val1 + val2 + val3;

            if (attempt.length < 3) {
                feedbackEl.innerText = "⚠️ 请输入完整的三位数密码！";
                feedbackEl.className = "error-text";
                return;
            }

            // 张老师拔尖题判定：这道题其实有三个在逻辑上都成立的解
            const validPasswords = ['531', '231', '135'];

            if (validPasswords.includes(attempt)) {
                feedbackEl.innerText = "🏆 咔哒！系统解锁成功！你找到了其中一个正确的密码排列！";
                feedbackEl.className = "correct-text";
                nextBtn.style.display = "inline-block"; // 显示下一关按钮
            } else {
                feedbackEl.innerText = "❌ 密码错误，警报响起！提示：假设7是正确的，会发生什么矛盾？";
                feedbackEl.className = "error-text";
            }
        }
    </script>
</body>
</html>
