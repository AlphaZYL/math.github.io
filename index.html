<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 趣味奥数闯关大挑战 🏆</title>
    <style>
        :root {
            --bg-deep: #010515; /* 深蓝黑背景 */
            --bg-mid: #0a193c; /* 中蓝 */
            --highlight-cyan: #00f2ff; /* 亮青 */
            --text-light: #e0f7fa; /* 浅青文 */
            --glass-bg: rgba(10, 25, 60, 0.7); /* 半透明玻璃 */
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden; /* 防止背景元素掉落引起滚动条 */
            background: radial-gradient(circle at center, var(--bg-mid) 0%, var(--bg-deep) 100%);
            color: var(--text-light);
            position: relative; /* 为绝对定位的署名提供参照 */
        }

        /* 数学符号雨的容器，层级设为0，并在最底层 */
        #math-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* 确保背景动画不会阻挡鼠标点击事件 */
            overflow: hidden;
        }

        /* 单个下落符号的动画定义 */
        .math-symbol {
            position: absolute;
            color: rgba(0, 242, 255, 0.2); /* 半透明的科技青色 */
            font-weight: bold;
            font-family: 'Times New Roman', serif;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        /* 主体内容容器，层级设为10，确保浮在背景雨的上方 */
        .content-wrapper {
            position: relative;
            z-index: 10; 
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 0 0 15px var(--highlight-cyan);
        }

        .header h1 {
            font-size: 3.8em;
            margin: 0;
            letter-spacing: 3px;
            color: var(--highlight-cyan); 
            font-weight: 900;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.8;
            margin-top: 10px;
        }

        .game-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* 科技感玻璃质感卡片 */
        .game-card {
            background: var(--glass-bg); 
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 15px;
            padding: 50px 30px;
            width: 260px;
            text-decoration: none;
            color: var(--text-light);
            font-size: 1.6em;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.03);
            background: rgba(15, 40, 90, 0.8);
            border-color: var(--highlight-cyan); 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            color: var(--highlight-cyan);
        }

        .game-card .icon {
            font-size: 2.8em;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 5px var(--highlight-cyan));
        }

        /* 作者署名样式，固定在右下角 */
        .author-signature {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(0, 242, 255, 0.6);
            font-size: 1.1em;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
            z-index: 10;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="math-rain"></div>

    <div class="content-wrapper">
        <div class="header">
            <h1>🏆 趣味奥数闯关大挑战 🏆</h1>
            <p>准备开始你的思维探险之旅</p>
        </div>

        <div class="game-container">
            <a href="game1.html" class="game-card">
                <span class="icon">🧩</span>
                <span>第一关：<br>逻辑之星</span>
            </a>
            <a href="game2.html" class="game-card">
                <span class="icon">💎</span>
                <span>第二关：<br>密码破解</span>
            </a>
            <a href="game3.html" class="game-card">
                <span class="icon">🚀</span>
                <span>第三关：<br>雷区探秘</span>
            </a>
        </div>
    </div>

    <div class="author-signature">作者：数学张老师</div>

    <script>
        const symbols = ['π', '∑', '∞', '∫', '×', '÷', '+', '-', '=', '√', '∠', '∵', '∴', '≈', '≠', 'α', 'β', 'θ', 'x²', 'y³'];
        const rainContainer = document.getElementById('math-rain');
        const numSymbols = 60; 

        for (let i = 0; i < numSymbols; i++) {
            let sym = document.createElement('div');
            sym.className = 'math-symbol';
            sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            
            sym.style.left = Math.random() * 100 + 'vw';
            sym.style.animationDuration = (Math.random() * 8 + 6) + 's';
            sym.style.animationDelay = Math.random() * 10 + 's';
            sym.style.fontSize = (Math.random() * 1.5 + 1) + 'em';
            sym.style.opacity = Math.random() * 0.5 + 0.1;
            
            rainContainer.appendChild(sym);
        }
    </script>
</body>
</html>
