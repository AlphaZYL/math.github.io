<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 趣味奥数闯关大挑战 🏆</title>
    <style>
        :root {
            --bg-deep: #010515; /* 深蓝黑背景 */
            --bg-mid: #0a193c; /* 中蓝 */
            --highlight-cyan: #00f2ff; /* 亮青 */
            --text-light: #e0f7fa; /* 浅青文 */
            --glass-bg: rgba(10, 25, 60, 0.7); /* 半透明玻璃 */
        }

        body, html {
            min-height: 100vh; /* 确保最小高度为满屏 */
            margin: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden; /* 防止横向滚动条 */
            overflow-y: auto; /* 允许纵向滑动 */
            background: radial-gradient(circle at center, var(--bg-mid) 0%, var(--bg-deep) 100%);
            background-attachment: fixed; /* 背景固定，不随内容滚动 */
            color: var(--text-light);
            position: relative; 
        }

        body.locked {
            overflow: hidden;
        }

        /* 数学符号雨的容器，层级设为0，并在最底层 */
        #math-rain {
            position: fixed; /* 改为fixed，确保滚动时雨滴全屏覆盖 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none; /* 确保背景动画不会阻挡鼠标点击事件 */
            overflow: hidden;
        }

        /* 单个下落符号的动画定义 */
        .math-symbol {
            position: absolute;
            color: rgba(0, 242, 255, 0.2); 
            font-weight: bold;
            font-family: 'Times New Roman', serif;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        /* 主体内容容器 */
        .content-wrapper {
            position: relative;
            z-index: 10; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px 80px 20px; /* 增加上下内边距，方便滚动到底部 */
            box-sizing: border-box;
        }

        body.locked .content-wrapper {
            filter: blur(6px);
            pointer-events: none;
            user-select: none;
        }

        #key-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(1, 5, 21, 0.78);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 20px;
            box-sizing: border-box;
        }

        .key-box {
            width: 100%;
            max-width: 420px;
            background: rgba(10, 25, 60, 0.88);
            border: 2px solid rgba(0, 242, 255, 0.35);
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.25);
            padding: 24px;
            text-align: center;
        }

        .key-title {
            margin: 0 0 10px;
            color: var(--highlight-cyan);
            font-size: 1.5em;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }

        .key-tip {
            margin: 0 0 16px;
            color: rgba(224, 247, 250, 0.85);
            font-size: 0.98em;
        }

        .key-input {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            border: 1px solid rgba(0, 242, 255, 0.5);
            background: rgba(0, 0, 0, 0.35);
            color: var(--text-light);
            outline: none;
            text-align: center;
            font-size: 1.05em;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .key-submit {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #0a99ff, #00f2ff);
            color: #001018;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
        }

        .key-error {
            min-height: 22px;
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 0.95em;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 0 15px var(--highlight-cyan);
        }

        .header h1 {
            font-size: 3.8em;
            margin: 0;
            letter-spacing: 3px;
            color: var(--highlight-cyan); 
            font-weight: 900;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.8;
            margin-top: 10px;
        }

        .game-container {
            display: flex;
            justify-content: center;
            gap: 30px; /* 稍微缩小间距以适应更多卡片 */
            flex-wrap: wrap;
            max-width: 1200px;
        }

        /* 科技感玻璃质感卡片 */
        .game-card {
            background: var(--glass-bg); 
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 15px;
            padding: 40px 20px;
            width: 240px; /* 稍微调窄一点 */
            text-decoration: none;
            color: var(--text-light);
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(15, 40, 90, 0.8);
            border-color: var(--highlight-cyan); 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            color: var(--highlight-cyan);
        }

        .game-card .icon {
            font-size: 2.8em;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 5px var(--highlight-cyan));
        }

        /* 作者署名样式，固定在页面最底部 */
        .author-signature {
            position: absolute;
            bottom: 20px;
            right: 30px;
            color: rgba(0, 242, 255, 0.6);
            font-size: 1.1em;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
            z-index: 10;
            font-style: italic;
        }

        /* 📱 手机端自适应优化 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2em; /* 缩小标题 */
                letter-spacing: 1px;
            }
            .header p {
                font-size: 1em;
            }
            .content-wrapper {
                padding: 30px 15px 70px 15px;
            }
            .game-container {
                gap: 20px;
            }
            .game-card {
                width: 90%; /* 手机端单列显示，卡片拉宽 */
                max-width: 320px;
                padding: 30px 20px;
                font-size: 1.4em;
            }
            .author-signature {
                right: 50%;
                transform: translateX(50%); /* 手机端居中显示作者 */
                font-size: 1em;
            }
        }
    </style>
</head>
<body class="locked">

    <div id="math-rain"></div>

    <div id="key-overlay">
        <div class="key-box">
            <h2 class="key-title">🔐 请输入访问密钥</h2>
            <p class="key-tip">验证通过后才可进入首页并开始闯关。</p>
            <input id="key-input" class="key-input" type="password" placeholder="输入密钥" autocomplete="off">
            <button id="key-submit" class="key-submit">解锁进入</button>
            <div id="key-error" class="key-error"></div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="header">
            <h1>🏆 趣味奥数闯关大挑战 🏆</h1>
            <p>准备开始你的思维探险之旅</p>
        </div>

        <div class="game-container">
            <a href="game1.html" class="game-card">
            <span class="icon">🔍</span>
            <span>第一关：<br>逻辑之星</span>
            </a>
            <a href="game2.html" class="game-card">
            <span class="icon">🔐</span>
            <span>第二关：<br>密码破解</span>
            </a>
            <a href="game3.html" class="game-card">
            <span class="icon">💣</span>
            <span>第三关：<br>雷区探秘</span>
            </a>
            <a href="game4.html" class="game-card">
            <span class="icon">🔢</span>
            <span>第四关：<br>数字之谜</span>
            </a>
            <a href="game5.html" class="game-card">
            <span class="icon">🎲</span>
            <span>第五关：<br>概率趣题</span>
            </a>
            <a href="game6.html" class="game-card">
            <span class="icon">🐔🐰</span>
            <span>第六关：<br>鸡兔同笼</span>
            </a>
            <a href="game7.html" class="game-card">
            <span class="icon">⛵</span>
            <span>第七关：<br>小船过河</span>
            </a>
            <a href="game8.html" class="game-card">
            <span class="icon">⏳</span>
            <span>第八关：<br>三角迷阵</span>
            </a>
            <a href="game9.html" class="game-card">
            <span class="icon">🔜</span>
            <span>第九关：<br>敬请期待</span>
            </a>
        </div>
        
        <div class="author-signature">作者：数学张老师</div>
    </div>

    <script>
        const ACCESS_KEY = 'math2026';

        const symbols = ['π', '∑', '∞', '∫', '×', '÷', '+', '-', '=', '√', '∠', '∵', '∴', '≈', '≠', 'α', 'β', 'θ', 'x²', 'y³'];
        const rainContainer = document.getElementById('math-rain');
        const numSymbols = 50; // 稍微减少一点数量，保证手机端性能流畅

        for (let i = 0; i < numSymbols; i++) {
            let sym = document.createElement('div');
            sym.className = 'math-symbol';
            sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            
            sym.style.left = Math.random() * 100 + 'vw';
            sym.style.animationDuration = (Math.random() * 8 + 6) + 's';
            sym.style.animationDelay = Math.random() * 10 + 's';
            sym.style.fontSize = (Math.random() * 1.5 + 1) + 'em';
            sym.style.opacity = Math.random() * 0.5 + 0.1;
            
            rainContainer.appendChild(sym);
        }

        const keyInput = document.getElementById('key-input');
        const keySubmit = document.getElementById('key-submit');
        const keyError = document.getElementById('key-error');
        const keyOverlay = document.getElementById('key-overlay');
        const MAX_FAILED_ATTEMPTS = 5;
        const COOLDOWN_SECONDS = 30;
        let failedAttempts = 0;
        let cooldownLeft = 0;
        let cooldownTimer = null;

        function setCooldownState(isCooling) {
            keySubmit.disabled = isCooling;
            keyInput.disabled = isCooling;
            keySubmit.style.opacity = isCooling ? '0.65' : '1';
            keySubmit.style.cursor = isCooling ? 'not-allowed' : 'pointer';
        }

        function startCooldown() {
            cooldownLeft = COOLDOWN_SECONDS;
            setCooldownState(true);
            keyError.innerText = `⏳ 连续输错 ${MAX_FAILED_ATTEMPTS} 次，已锁定，请 ${cooldownLeft} 秒后再试。`;

            if (cooldownTimer) {
                clearInterval(cooldownTimer);
            }

            cooldownTimer = setInterval(() => {
                cooldownLeft--;

                if (cooldownLeft > 0) {
                    keyError.innerText = `⏳ 连续输错 ${MAX_FAILED_ATTEMPTS} 次，已锁定，请 ${cooldownLeft} 秒后再试。`;
                    return;
                }

                clearInterval(cooldownTimer);
                cooldownTimer = null;
                failedAttempts = 0;
                setCooldownState(false);
                keyError.innerText = '✅ 冷却结束，请重新输入密钥。';
                keyInput.focus();
            }, 1000);
        }

        function unlockPage() {
            document.body.classList.remove('locked');
            keyOverlay.style.display = 'none';
            keyError.innerText = '';
            failedAttempts = 0;

            if (cooldownTimer) {
                clearInterval(cooldownTimer);
                cooldownTimer = null;
            }
        }

        function checkAccessKey() {
            if (cooldownLeft > 0) {
                keyError.innerText = `⏳ 当前处于冷却中，请 ${cooldownLeft} 秒后再试。`;
                return;
            }

            if (keyInput.value.trim() === ACCESS_KEY) {
                unlockPage();
                return;
            }

            failedAttempts++;
            const remaining = MAX_FAILED_ATTEMPTS - failedAttempts;

            if (remaining <= 0) {
                keyInput.value = '';
                startCooldown();
                return;
            }

            keyError.innerText = `❌ 密钥错误，还可再试 ${remaining} 次。`;
            keyInput.value = '';
            keyInput.focus();
        }

        keySubmit.addEventListener('click', checkAccessKey);
        keyInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                checkAccessKey();
            }
        });

        window.addEventListener('load', () => {
            keyInput.focus();
        });
    </script>
</body>
</html>
