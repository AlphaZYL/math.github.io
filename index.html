<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三年级趣味奥数闯关</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: #f0f8ff; /* 柔和的爱丽丝蓝背景 */
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .header { 
            background-color: #4CAF50; 
            color: white; 
            padding: 20px; 
            border-radius: 15px;

            width: 80%; 
            max-width: 800px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .subtitle { 
            font-size: 1em;

            margin-top: 5px;
        }
        .game-container {

            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap; 
            margin-top: 50px; 
        }
        .game-card { 
            background-color: white; 
            border: 3px solid #ddd; 
            border-radius: 20px; 
            padding: 40px 20px; 
            width: 220px; 
            text-decoration: none; 
            color: #333; 
            font-size: 1.3em; 
            font-weight: bold; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.05); 
            transition: all 0.3s ease; 
        }
        .game-card:hover { 
            transform: translateY(-10px); 
            border-color: #FF9800; 
            color: #FF9800; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
