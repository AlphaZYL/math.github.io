<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 趣味奥数闯关大挑战 🏆</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden; /* 防止背景滚动 */
        }

        /* 使用生成的精美背景图 */
        .bg-image {
            background-image: url('image_0.png'); 
            height: 100%; 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }

        /* 黑色遮罩，让文字更清晰 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3); /* 调整透明度 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            color: white;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-size: 3.5em;
            margin: 0;
            letter-spacing: 2px;
        }

        .game-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* 设计具有科技感和童趣的游戏卡片 */
        .game-card {
            background: rgba(255, 255, 255, 0.15); /* 半透明白 */
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 50px 30px;
            width: 250px;
            text-decoration: none;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); /* 玻璃纳摩效果 */
            backdrop-filter: blur(4px); /* 背景模糊 */
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            border-color: #FF9800; /* 悬停时变为橙色边框 */
            box-shadow: 0 12px 40px 0 rgba(255, 152, 0, 0.5);
        }

        .game-card .icon {
            font-size: 2em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="overlay">
            <div class="header">
                <h1>🏆 趣味奥数闯关大挑战 🏆</h1>
            </div>

            <div class="game-container">
                <a href="game1.html" class="game-card">
                    <span class="icon">🧩</span>
                    <span>关卡一：<br>逻辑迷宫</span>
                </a>
                <a href="game2.html" class="game-card">
                    <span class="icon">💎</span>
                    <span>关卡二：<br>数字寻宝</span>
                </a>
                <a href="game3.html" class="game-card">
                    <span class="icon">🚀</span>
                    <span>关卡三：<br>图形密码</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
